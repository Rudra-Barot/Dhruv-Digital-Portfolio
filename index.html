<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dhruv Patel — Portfolio</title>

<link href="https://fonts.googleapis.com/css2?family=Clash+Display:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

:root{

--bg:#0c0c0c;
--card:#141414;
--glass:rgba(255,255,255,0.05);

--accent:#7c5cff;
--accent2:#00d4ff;

--text:#ffffff;
--muted:#9f9f9f;

}

body{
font-family:Inter;
background:var(--bg);
color:var(--text);
overflow-x:hidden;
}

/* gradient glow background */

body::before{

content:"";
position:fixed;
width:700px;
height:700px;

background:radial-gradient(circle,var(--accent),transparent 60%);
filter:blur(200px);
opacity:0.4;

top:-200px;
left:-200px;

z-index:-1;

}

body::after{

content:"";
position:fixed;

width:600px;
height:600px;

background:radial-gradient(circle,var(--accent2),transparent 60%);
filter:blur(200px);

bottom:-200px;
right:-200px;

opacity:0.4;
z-index:-1;

}

/* navbar */

nav{

position:fixed;
top:0;
width:100%;

display:flex;
justify-content:space-between;
align-items:center;

padding:1.5rem 8vw;

background:rgba(0,0,0,0.3);
backdrop-filter:blur(12px);

border-bottom:1px solid rgba(255,255,255,0.05);

z-index:100;

}

.logo{

font-family:"Clash Display";
font-weight:600;
font-size:1.3rem;

letter-spacing:-0.02em;

}

.nav-links{

display:flex;
gap:2rem;

}

.nav-links a{

color:var(--muted);
text-decoration:none;
font-size:0.9rem;

transition:0.25s;

}

.nav-links a:hover{

color:white;

}

/* hero */

.hero{

height:100vh;

display:flex;
align-items:center;
justify-content:center;

padding:0 8vw;

}

.hero-container{

max-width:1200px;

}

.hero-tag{

font-size:.8rem;
letter-spacing:.2em;
color:var(--accent2);

margin-bottom:1.5rem;

text-transform:uppercase;

}

.hero-name{

font-family:"Clash Display";
font-size:clamp(3rem,7vw,6rem);
line-height:1;

letter-spacing:-0.03em;

margin-bottom:1.5rem;

background:linear-gradient(90deg,var(--accent),var(--accent2));
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;

}

.hero-sub{

font-size:1.1rem;
color:var(--muted);

max-width:600px;

line-height:1.7;

margin-bottom:2.5rem;

}

/* buttons */

.hero-buttons{

display:flex;
gap:1rem;

}

.btn{

padding:14px 28px;

border-radius:10px;

font-size:.9rem;

cursor:pointer;

text-decoration:none;

transition:0.3s;

}

.btn-primary{

background:linear-gradient(90deg,var(--accent),var(--accent2));

color:white;

}

.btn-primary:hover{

transform:translateY(-4px);
box-shadow:0 10px 25px rgba(0,0,0,0.5);

}

.btn-outline{

border:1px solid rgba(255,255,255,0.15);

color:white;

}

.btn-outline:hover{

border-color:var(--accent);

}

/* floating glass card */

.hero-card{

margin-top:4rem;

background:var(--glass);

backdrop-filter:blur(20px);

padding:2rem;

border-radius:16px;

display:flex;
gap:3rem;

border:1px solid rgba(255,255,255,0.05);

width:fit-content;

}

.stat h3{

font-family:"Clash Display";
font-size:2rem;

}

.stat p{

font-size:.8rem;
color:var(--muted);

}

</style>
</head>

<body>

<nav>

<div class="logo">DP.</div>

<div class="nav-links">

<a href="#">About</a>
<a href="#">Skills</a>
<a href="#">Projects</a>
<a href="#">Education</a>
<a href="#">Contact</a>

</div>

</nav>

<section class="hero">

<div class="hero-container">

<div class="hero-tag">
Software Developer
</div>

<h1 class="hero-name">
Dhruv Patel
</h1>

<p class="hero-sub">
I build high-performance digital products, scalable systems, and elegant user experiences that merge engineering with creativity.
</p>

<div class="hero-buttons">

<a class="btn btn-primary" href="#">View Projects</a>

<a class="btn btn-outline" href="#">Contact Me</a>

</div>

<div class="hero-card">

<div class="stat">
<h3>6+</h3>
<p>Projects</p>
</div>

<div class="stat">
<h3>3</h3>
<p>Internships</p>
</div>

<div class="stat">
<h3>8.4</h3>
<p>CGPA</p>
</div>

</div>

</div>

</section>

</body>
</html>
